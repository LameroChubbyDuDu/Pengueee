<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');

    body {
        align-items: center;
        justify-content: center;
        text-align: center;

        display: flex;

        background:linear-gradient(90deg, rgb(216, 68, 68) 5px, rgb(247, 175, 175) 5px);
        background-size: 50px 50px ;
    }

    .mail-box{
        margin-top: 15vh;
        align-items: center;
        justify-content:center;
        text-align: center;

        display: flex;
        flex-direction: row;
        flex-wrap: wrap;

        position: relative;
        gap:35px;
    }

    .mail-1, .mail-2, .mail-3, .mail-4, .mail-5, .mail-6 {
        background-image: url("img/letter2.png");
        background-size: contain;
        background-repeat: no-repeat;
        width: 200px;
        height:200px;
        position: relative;

        align-items: center;
        justify-content: center;
        text-align: center;

    }

    .letter-1, .letter-2, .letter-3, .letter-4, .letter-5, .letter-6{
        background-color: #FFFFFF;
        width: 150px;
        height: 50px;
        position:absolute;
        top: 16.8%;
        left: 13%;
        
    }

    .letterWithContent-1, .letterWithContent-2, .letterWithContent-3, .letterWithContent-4, .letterWithContent-5, .letterWithContent-6{
        background-color: #FFFFFF;
        width: 150px;
        height: 160px;
        position:absolute;
        left: 13%;
        clip-path: inset(100% 0 0 0);
    }

    .letterWithContent-1{
        background-image: url("img/letter_1.png");
        background-size: contain;
    }

    .mail-1:hover .letterWithContent-1{ 
        animation: letterAnimation 2s linear forwards;
    }

    .mail-2:hover .letterWithContent-2{ 
        animation: letterAnimation 2s linear forwards;
    }

    .mail-3:hover .letterWithContent-3{ 
        animation: letterAnimation 2s linear forwards;
    }

    .mail-4:hover .letterWithContent-4{ 
        animation: letterAnimation 2s linear forwards;
    }

    .mail-5:hover .letterWithContent-5{ 
        animation: letterAnimation 2s linear forwards;
    }

    .mail-6:hover .letterWithContent-6{ 
        animation: letterAnimation 2s linear forwards;
    }

    @media(min-width:1200px) {}

    @keyframes letterAnimation {
        0%{
            top: -38%;
            clip-path: inset(100% 0 0 0);
        }
        100%{
            top: -40%;
            clip-path: inset(0% 0 0 0);
        }
    }
</style>

<body>
    <div class="desk-page">
        <div class="mail-box">
            <div class="mail-1">
                <!-- <div class="letter-1"></div> -->
                <div class="letterWithContent-1"></div>
            </div>
            <div class="mail-2"><div class="letterWithContent-2"></div></div>
            <div class="mail-3"><div class="letterWithContent-3"></div></div>
            <div class="mail-4"><div class="letterWithContent-4"></div></div>
            <div class="mail-5"><div class="letterWithContent-5"></div></div>
            <div class="mail-6"><div class="letterWithContent-6"></div></div>
        </div>
    </div>

    <body>
        <script>

        </script>

</html>
